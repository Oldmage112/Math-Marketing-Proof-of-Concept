  <g id="top01"><use xlink:href="#upto02"/><use xlink:href="#hex1" x="-350" y="700"/><use xlink:href="#hex1" x="350" y="700"/>
                                           <use xlink:href="#hex1" x="-300" y="600"/><use xlink:href="#hex1" x="300" y="600"/>
                                           <use xlink:href="#hex1" x="-250" y="500"/><use xlink:href="#hex1" x="250" y="500"/>
                                           <use xlink:href="#hex1" x="-200" y="400"/><use xlink:href="#hex1" x="200" y="400"/>
                                           <use xlink:href="#hex1" x="-150" y="300"/><use xlink:href="#hex1" x="150" y="300"/>
