<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="-960 -900 1920 1440">
 <title>Pascal triangle 3d animation</title>
 <desc>Visualisation of the values in the first eight rows of the Pascal triangle as a rotating SVG CSS3 animation by CMG Lee. Even values are light and odd ones are dark.</desc>
 <style type="text/css">
  #main  { font-family:Times,Times New Roman,serif; font-size:96px; text-anchor:middle;
           fill:none; stroke:none; stroke-linejoin:round; stroke-width:3; }
  text   { stroke:none; cursor:default; }
  .odd   { fill:#ffcc99; }
  .even  { fill:#660000; }
  @keyframes         rotate { 0%   { transform:         rotate(  0deg); }
                              100% { transform:         rotate(360deg); } }
  @-moz-keyframes    rotate { 0%   { -moz-transform:    rotate(  0deg); }
                              100% { -moz-transform:    rotate(360deg); } }
  @-webkit-keyframes rotate { 0%   { -webkit-transform: rotate(  0deg); }
                              100% { -webkit-transform: rotate(360deg); } }
  .rotate { animation:         rotate 60s linear infinite;
            -moz-animation:    rotate 60s linear infinite;
            -webkit-animation: rotate 60s linear infinite; }
  @keyframes         scale { 0%   { transform:         scale(1.73205,1.0); }
                             100% { transform:         scale(1.73205,0.2); } }
  @-moz-keyframes    scale { 0%   { -moz-transform:    scale(1.73205,1.0); }
                             100% { -moz-transform:    scale(1.73205,0.2); } }
  @-webkit-keyframes scale { 0%   { -webkit-transform: scale(1.73205,1.0); }
                             100% { -webkit-transform: scale(1.73205,0.2); } }
  .scale { animation:         scale 47s ease-in alternate infinite;
           -moz-animation:    scale 47s ease-in alternate infinite;
           -webkit-animation: scale 47s ease-in alternate infinite; }
  @keyframes         translate { 0%   { transform:         translateY(  0px); }
                                 100% { transform:         translateY(-30px); } }
  @-moz-keyframes    translate { 0%   { -moz-transform:    translateY(  0px); }
                                 100% { -moz-transform:    translateY(-30px); } }
  @-webkit-keyframes translate { 0%   { -webkit-transform: translateY(  0px); }
                                 100% { -webkit-transform: translateY(-30px); } }
  .translate { animation:         translate 60s ease alternate infinite;
               -moz-animation:    translate 60s ease alternate infinite;
               -webkit-animation: translate 60s ease alternate infinite; }
 </style>
 <defs>
  <radialGradient id="grad_bg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
   <stop offset="90%" stop-color="#6699cc"/>
   <stop offset="99%" stop-color="#000033"/>
  </radialGradient>
  <radialGradient id="grad_shadow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
   <stop offset="90%"  stop-color="#336699"/>
   <stop offset="100%" stop-color="#6699cc"/>
  </radialGradient>
  <ellipse id="shadow" cx="0" cy="-440" rx="51" ry="58" fill="url(#grad_shadow)"/>
